name: Build and Publish Docker Image

on:
    push:
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build:
        name: Build ${{ matrix.arch }}
        runs-on: ${{ matrix.runner }}
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm

        steps:
            # 检出代码
            - name: Checkout repository
              uses: actions/checkout@v6

            # 标准化 GHCR 镜像名。GHCR/Docker image reference 需要小写。
            - name: Prepare image name
              id: image
              shell: bash
              run: echo "name=${REGISTRY}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

            # 设置 Docker Buildx
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            # 登录到 GitHub Container Registry (GHCR)
            - name: Log into GHCR
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # 提取 Docker 元数据
            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ steps.image.outputs.name }}

            # 使用原生架构 runner 构建单架构镜像，并按 digest 推送。
            - name: Build and push image by digest
              id: build
              uses: docker/build-push-action@v7
              with:
                  context: .
                  platforms: ${{ matrix.platform }}
                  outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=${{ matrix.arch }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
                  provenance: false

            # 传递 digest 给 merge job，后者负责创建多架构 manifest 和标签。
            - name: Export image digest
              shell: bash
              run: |
                  mkdir -p /tmp/digests
                  digest="${{ steps.build.outputs.digest }}"
                  touch "/tmp/digests/${digest#sha256:}"

            - name: Upload image digest
              uses: actions/upload-artifact@v7
              with:
                  name: digests-${{ matrix.arch }}
                  path: /tmp/digests/*
                  if-no-files-found: error
                  retention-days: 1

    merge:
        name: Create multi-arch manifest
        runs-on: ubuntu-latest
        needs: build
        permissions:
            contents: read
            packages: write

        steps:
            - name: Prepare image name
              id: image
              shell: bash
              run: echo "name=${REGISTRY}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

            - name: Download image digests
              uses: actions/download-artifact@v8
              with:
                  path: /tmp/digests
                  pattern: digests-*
                  merge-multiple: true

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log into GHCR
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ steps.image.outputs.name }}
                  tags: |
                      type=ref,event=branch
                      type=sha
                      type=raw,value=latest

            - name: Create and push multi-arch manifest
              shell: bash
              env:
                  IMAGE: ${{ steps.image.outputs.name }}
                  TAGS: ${{ steps.meta.outputs.tags }}
              run: |
                  set -euo pipefail

                  tag_args=()
                  while IFS= read -r tag; do
                      if [ -n "$tag" ]; then
                          tag_args+=("-t" "$tag")
                      fi
                  done <<< "$TAGS"

                  digest_args=()
                  while IFS= read -r digest_file; do
                      digest="$(basename "$digest_file")"
                      digest_args+=("${IMAGE}@sha256:${digest}")
                  done < <(find /tmp/digests -type f | sort)

                  if [ "${#digest_args[@]}" -eq 0 ]; then
                      echo "No image digests found" >&2
                      exit 1
                  fi

                  docker buildx imagetools create "${tag_args[@]}" "${digest_args[@]}"
